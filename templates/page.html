<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{.FileName}} - 文件分享</title>
<style>
	* { margin: 0; padding: 0; box-sizing: border-box; }
	body {
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
		background: #f7f8fa;
		color: #333;
		display: flex;
		flex-direction: column;
		justify-content: center;
		align-items: center;
		min-height: 100vh;
		padding: 16px;
	}
	.card {
		background: #fff;
		border-radius: 16px;
		padding: 40px 32px;
		box-shadow: 0 2px 24px rgba(0,0,0,0.06);
		max-width: 440px;
		width: 100%;
		text-align: center;
	}
	.file-icon {
		font-size: 56px;
		margin-bottom: 16px;
		line-height: 1;
	}
	.card h2 {
		font-size: 18px;
		font-weight: 600;
		color: #1a1a1a;
		margin-bottom: 8px;
		word-break: break-all;
	}
	.file-meta {
		display: flex;
		justify-content: center;
		gap: 16px;
		flex-wrap: wrap;
		margin-top: 8px;
	}
	.file-meta span {
		font-size: 13px;
		color: #888;
		background: #f5f5f5;
		padding: 4px 10px;
		border-radius: 6px;
	}
	.expire-info, .download-info {
		font-size: 13px;
		color: #999;
		margin-top: 12px;
	}
	.password-form {
		margin-top: 24px;
	}
	.password-form input[type="password"] {
		width: 100%;
		padding: 12px 16px;
		border: 2px solid #e5e5e5;
		border-radius: 10px;
		font-size: 15px;
		outline: none;
		transition: border-color 0.2s;
		text-align: center;
	}
	.password-form input[type="password"]:focus {
		border-color: #4f46e5;
	}
	.password-form button {
		width: 100%;
		margin-top: 12px;
		padding: 12px;
		background: #4f46e5;
		color: #fff;
		border: none;
		border-radius: 10px;
		font-size: 15px;
		font-weight: 500;
		cursor: pointer;
		transition: background 0.2s;
	}
	.password-form button:hover {
		background: #4338ca;
	}
	.download-section {
		margin-top: 24px;
	}
	.download-btn {
		display: inline-block;
		padding: 14px 40px;
		background: #4f46e5;
		color: #fff;
		border-radius: 10px;
		font-size: 16px;
		font-weight: 500;
		text-decoration: none;
		transition: background 0.2s, transform 0.1s;
	}
	.download-btn:hover {
		background: #4338ca;
	}
	.download-btn:active {
		transform: scale(0.98);
	}
	.error-msg {
		color: #e53e3e;
		font-size: 14px;
		margin-top: 12px;
	}
	.footer {
		margin-top: 24px;
		font-size: 12px;
		color: #bbb;
	}
	.footer a {
		color: #999;
		text-decoration: none;
	}
	.footer a:hover {
		color: #4f46e5;
	}
</style>
</head>
<body>
<div class="card">
	<div class="file-info">
		<div class="file-icon">&#x1F4C4;</div>
		<h2>{{.FileName}}</h2>
		<p class="file-meta">
			<span>大小: {{.FileSize}}</span>
			<span>类型: {{.MimeType}}</span>
		</p>
	</div>
	{{if .HasExpiry}}<p class="expire-info">有效期至: {{.ExpiryTime}} ({{.ExpiryRemain}})</p>{{end}}
	{{if .HasLimit}}<p class="download-info">剩余下载次数: {{.RemainingDownloads}} / {{.MaxDownloads}}</p>{{end}}
	{{if .NeedsPassword}}
	<div class="password-form">
		<form method="POST" action="/s/{{.Code}}">
			<input type="password" name="password" placeholder="请输入提取密码" required autofocus>
			<button type="submit">验证</button>
		</form>
	</div>
	{{else}}
	<div class="download-section">
		<a href="/s/{{.Code}}/download" class="download-btn">下载文件</a>
	</div>
	{{end}}
</div>
<div class="footer"><a href="https://github.com/minibear2021/togos" target="_blank">由 Togos 驱动</a></div>
</body>
</html>
