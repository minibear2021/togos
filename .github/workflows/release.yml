name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., v1.0.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          NAME="togos-${VERSION}-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags="-s -w -X main.version=${VERSION#v}" -o "$NAME" .
          sha256sum "$NAME" > "${NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: togos-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            togos-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## 安装

            下载对应平台的二进制文件直接运行。

            ```bash
            # Linux / macOS
            chmod +x togos-${{ steps.version.outputs.VERSION }}-<os>-<arch>
            ./togos-${{ steps.version.outputs.VERSION }}-<os>-<arch> -listen :8080

            # Windows
            togos-${{ steps.version.outputs.VERSION }}-windows-<arch>.exe -listen :8080
            ```

            ## 校验

            每个二进制文件附有 SHA256 校验和文件。

            ## 变更

            请查看 [CHANGELOG.md](CHANGELOG.md)。
          files: dist/*
          generate_release_notes: true
